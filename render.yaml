services:
  - type: web
    name: viraxis-api
    runtime: python
    plan: free
    # Root dir = raiz do repo (onde fica pyproject.toml e src/)
    buildCommand: pip install -e .
    startCommand: alembic upgrade head && uvicorn viraxis.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: src
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: LLM_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: SCOUT_LLM_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: RENDERER_LLM_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: SCOUT_ENABLE_TRANSCRIPTION
        value: "false"
      # Preencher no painel:
      - key: DATABASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
