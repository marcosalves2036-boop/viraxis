services:
  # ── API FastAPI ───────────────────────────────────────────────────────────────
  - type: web
    name: viraxis-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: LLM_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: SCOUT_LLM_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: RENDERER_LLM_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: SCOUT_ENABLE_TRANSCRIPTION
        value: "false"
      # Preencher no painel do Render:
      - key: DATABASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
