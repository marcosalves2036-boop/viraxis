services:
  # ── API FastAPI ───────────────────────────────────────────────────────────────
  - type: web
    name: viraxis-api
    runtime: python
    rootDir: viraxis_db
    buildCommand: pip install -e .
    startCommand: >
      alembic upgrade head &&
      uvicorn viraxis.api.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/src
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      # Preencha no painel do Render → Environment
      - key: DATABASE_URL
        sync: false          # ← colar URL do Supabase aqui
      - key: SECRET_KEY
        generateValue: true  # ← Render gera automaticamente
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: LLM_API_KEY
        sync: false          # ← sua chave Groq ou OpenAI
      - key: LLM_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: SCOUT_LLM_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: RENDERER_LLM_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: SCOUT_ENABLE_TRANSCRIPTION
        value: "false"
      # Redis (Upstash) — opcional, só necessário para Celery worker
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      # Stripe — deixar vazio para desabilitar billing
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_BUSINESS
        sync: false
